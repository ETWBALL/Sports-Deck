openapi: 3.0.0
info:
  title: SportsDeck API
  version: 1.0.0
servers:
  - url: http://localhost:3000
paths:
  /api/admin/appeals/{id}:
    get:
      summary: Get details of a specific appeal (admin only)
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxappeal001
      responses:
        '200':
          description: Appeal details with user, ban, and admin info
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Appeal not found
    patch:
      summary: Approve or reject a ban appeal (admin only)
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxappeal001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum:
                    - approved
                    - rejected
                  example: approved
                decisionNote:
                  type: string
                  example: After review, the ban was found to be unwarranted.
      responses:
        '200':
          description: Appeal reviewed; if approved, ban is lifted
        '400':
          description: Missing or invalid status, or appeal already reviewed
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Appeal not found
  /api/admin/appeals:
    get:
      summary: List all appeals with optional filters (admin only)
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum:
              - pending
              - approved
              - rejected
          example: pending
        - in: query
          name: page
          schema:
            type: integer
          example: 1
        - in: query
          name: limit
          schema:
            type: integer
          example: 20
      responses:
        '200':
          description: Paginated list of appeals
        '400':
          description: Invalid status value
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/admin/bans/{id}/lift:
    patch:
      summary: Lift (unban) an active ban (admin only)
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxban001
      responses:
        '200':
          description: Ban lifted and user unbanned
        '400':
          description: Ban is not active
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Ban not found
  /api/admin/bans/{id}:
    get:
      summary: Get details of a specific ban record (admin only)
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxban001
      responses:
        '200':
          description: Ban details with user, admin, report, and appeal info
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Ban not found
  /api/admin/bans:
    post:
      summary: Ban a user (admin only)
      tags:
        - Admin
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - reason
              properties:
                userId:
                  type: string
                  example: clxuser789
                reason:
                  type: string
                  example: Repeated violations of community guidelines.
                reportedItemId:
                  type: string
                  example: clxreporteditem001
                reportId:
                  type: string
                  example: clxreport001
      responses:
        '201':
          description: Ban created
        '400':
          description: Missing fields, user is an admin, or invalid reported item/report ID
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (not an admin)
        '404':
          description: User, reported item, or report not found
        '409':
          description: User is already banned
    get:
      summary: List bans with optional status filter and pagination (admin only)
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum:
              - active
              - lifted
          example: active
        - in: query
          name: page
          schema:
            type: integer
          example: 1
        - in: query
          name: limit
          schema:
            type: integer
          example: 20
      responses:
        '200':
          description: Paginated list of bans
        '400':
          description: Invalid status value
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/admin/posts/{id}/hide:
    patch:
      summary: Hide a post (admin only)
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxpost001
      responses:
        '200':
          description: Post hidden
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Post not found
  /api/admin/posts/{id}:
    get:
      summary: Get a post record for administration (admin only)
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxpost001
      responses:
        '200':
          description: Post details
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Post not found
  /api/admin/replies/{id}/hide:
    patch:
      summary: Hide a reply (admin only)
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxreply001
      responses:
        '200':
          description: Reply hidden
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Reply not found
  /api/admin/replies/{id}:
    get:
      summary: Get a reply record for administration (admin only)
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxreply001
      responses:
        '200':
          description: Reply details
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Reply not found
  /api/admin/reports/{id}/analyze:
    post:
      summary: Trigger a fresh AI analysis on reported content (admin only)
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxreporteditem001
      responses:
        '200':
          description: >-
            AI verdict updated with fresh toxicity score, labels, and
            explanation
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Reported item or its content not found
  /api/admin/reports/{id}/approve:
    patch:
      summary: >-
        Approve a report — hides content and optionally bans the user (admin
        only)
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxreporteditem001
      responses:
        '200':
          description: Report approved and status set to APPROVED
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Reported item not found
  /api/admin/reports/{id}/dismiss:
    patch:
      summary: Dismiss a report — sets status to DISMISSED (admin only)
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxreporteditem001
      responses:
        '200':
          description: Report dismissed
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Reported item not found
  /api/admin/reports/{id}:
    get:
      summary: Get full detail of a reported item including AI verdict (admin only)
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxreporteditem001
      responses:
        '200':
          description: >-
            Reported item with all reports, admin actions, content preview, and
            AI verdict
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Reported item not found
  /api/admin/reports:
    get:
      summary: Admin moderation queue of reported items (admin only)
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum:
              - pending
              - dismissed
              - approved
          example: pending
        - in: query
          name: sort
          description: >-
            ai = highest toxicity first; reports = most reported first; recent =
            most recently reported first
          schema:
            type: string
            enum:
              - ai
              - reports
              - recent
          example: ai
        - in: query
          name: page
          schema:
            type: integer
          example: 1
        - in: query
          name: limit
          schema:
            type: integer
          example: 20
      responses:
        '200':
          description: Paginated moderation queue
        '400':
          description: Invalid status value
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/admin/threads/{id}/hide:
    patch:
      summary: Hide a thread (admin only)
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxthread001
      responses:
        '200':
          description: Thread hidden
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Thread not found
  /api/admin/threads/{id}:
    get:
      summary: Get a thread record for administration (admin only)
      tags:
        - Admin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxthread001
      responses:
        '200':
          description: Thread details
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Thread not found
  /api/appeals:
    post:
      summary: Submit a ban appeal
      tags:
        - Appeals
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  example: >-
                    I believe my ban was issued in error. I did not violate any
                    rules.
      responses:
        '201':
          description: Appeal submitted
        '400':
          description: Missing message, invalid JSON, or user is not banned
        '401':
          description: Unauthorized
        '404':
          description: No active ban found
        '409':
          description: Pending appeal already exists for this ban
    get:
      summary: Get the authenticated user's own appeals
      tags:
        - Appeals
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum:
              - pending
              - approved
              - rejected
          example: pending
        - in: query
          name: page
          schema:
            type: integer
          example: 1
        - in: query
          name: limit
          schema:
            type: integer
          example: 20
      responses:
        '200':
          description: Paginated list of user's appeals
        '400':
          description: Invalid status value
        '401':
          description: Unauthorized
  /api/auth/login:
    post:
      summary: Log in with email and password
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: user@example.com
                password:
                  type: string
                  example: securePassword123
      responses:
        '200':
          description: Login successful, returns access and refresh tokens
        '400':
          description: Missing fields or invalid request body
        '401':
          description: Invalid username or password
        '500':
          description: Internal server error
  /api/auth/refresh:
    post:
      summary: Refresh access token using a refresh token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: New access and refresh tokens returned
        '400':
          description: Missing refresh token
        '401':
          description: Invalid or expired refresh token
  /api/auth/signup:
    post:
      summary: Register a new user account
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: newuser@example.com
                password:
                  type: string
                  example: securePassword123
      responses:
        '201':
          description: Account created, returns access and refresh tokens
        '400':
          description: Missing fields or invalid request body
        '409':
          description: Email already in use
        '500':
          description: Internal server error
  /api/digest:
    get:
      summary: >-
        Get the AI-generated daily digest summarizing top discussions, matches,
        and standings
      tags:
        - Digest
      parameters:
        - in: query
          name: date
          schema:
            type: string
            format: date
          example: '2026-03-08'
        - in: query
          name: force
          schema:
            type: boolean
          example: false
      responses:
        '200':
          description: Daily digest content
        '404':
          description: No digest found for the requested date
        '500':
          description: Internal server error
  /api/favourite-teams/{teamId}:
    delete:
      summary: Remove a favourite team
      tags:
        - FavouriteTeams
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: teamId
          required: true
          schema:
            type: string
          example: clxteam123
      responses:
        '200':
          description: Favourite team removed
        '401':
          description: Unauthorized
        '404':
          description: Team not found
  /api/favourite-teams:
    post:
      summary: Set the authenticated user's favourite team
      tags:
        - FavouriteTeams
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - teamId
              properties:
                teamId:
                  type: string
                  example: clxteam123
      responses:
        '200':
          description: Favourite team set
        '401':
          description: Unauthorized
        '404':
          description: Team not found
  /api/feed/{id}/read:
    patch:
      summary: Mark a feed entry as read
      tags:
        - Feed
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxfeed001
      responses:
        '200':
          description: Feed entry marked as read
        '401':
          description: Unauthorized
        '404':
          description: Feed entry not found
        '500':
          description: Internal server error
  /api/feed:
    get:
      summary: Get the authenticated user's personalized activity feed
      tags:
        - Feed
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
          example: 20
      responses:
        '200':
          description: List of grouped feed entries
        '401':
          description: Unauthorized
        '500':
          description: Internal server error
  /api/follow/{userId}:
    post:
      summary: Follow a user
      tags:
        - Follow
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
          example: clxuser789
      responses:
        '200':
          description: Now following the user
        '400':
          description: Cannot follow yourself or already following
        '401':
          description: Unauthorized
        '403':
          description: Account banned
        '500':
          description: Internal server error
    delete:
      summary: Unfollow a user
      tags:
        - Follow
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
          example: clxuser789
      responses:
        '200':
          description: Successfully unfollowed
        '401':
          description: Unauthorized
        '403':
          description: Account banned
        '500':
          description: Internal server error
  /api/matches/{id}:
    get:
      summary: >-
        Get a single match by database ID, refreshing stale data from the
        external API
      tags:
        - Matches
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxmatch001
      responses:
        '200':
          description: Match details with home and away team info
        '404':
          description: Match not found
        '500':
          description: Internal server error
  /api/matches/{id}/thread:
    get:
      summary: Get (or auto-create) the discussion thread for a match
      tags:
        - Matches
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxmatch001
      responses:
        '200':
          description: Match discussion thread
        '404':
          description: Match not found
        '500':
          description: Internal server error
  /api/matches:
    get:
      summary: Get Premier League matches by matchday or date range
      tags:
        - Matches
      parameters:
        - in: query
          name: matchday
          schema:
            type: integer
          example: 20
        - in: query
          name: dateFrom
          schema:
            type: string
            format: date
          example: '2026-03-01'
        - in: query
          name: dateTo
          schema:
            type: string
            format: date
          example: '2026-03-07'
      responses:
        '200':
          description: List of matches with team info
        '400':
          description: Invalid or missing matchday/date range parameters
        '500':
          description: Internal server error
  /api/notifications/{id}/read:
    patch:
      summary: Mark a notification as read
      tags:
        - Notifications
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxnotif001
      responses:
        '200':
          description: Notification marked as read
        '401':
          description: Unauthorized
        '404':
          description: Notification not found
  /api/notifications:
    get:
      summary: Get unread notifications for the authenticated user
      tags:
        - Notifications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of unread notifications
        '401':
          description: Unauthorized
  /api/polls/{id}/options:
    post:
      summary: Add options to an existing poll
      tags:
        - Polls
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxpoll001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - options
              properties:
                options:
                  type: array
                  items:
                    type: string
                  example:
                    - Arsenal
                    - Chelsea
      responses:
        '201':
          description: Options added to poll
        '400':
          description: Options array required
        '401':
          description: Unauthorized
        '403':
          description: Forbidden or account banned
        '404':
          description: Poll not found
        '500':
          description: Internal server error
  /api/polls/{id}/results:
    get:
      summary: Get vote counts per poll option
      tags:
        - Polls
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxpoll001
      responses:
        '200':
          description: Poll results with per-option vote counts
        '404':
          description: Poll not found
        '500':
          description: Internal server error
  /api/polls/{id}:
    get:
      summary: Get poll details including question, options, and deadline
      tags:
        - Polls
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxpoll001
      responses:
        '200':
          description: Poll details
        '404':
          description: Poll not found
        '500':
          description: Internal server error
    patch:
      summary: Edit poll question or deadline (thread owner or admin)
      tags:
        - Polls
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxpoll001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                question:
                  type: string
                  example: Who will score first?
                deadline:
                  type: string
                  format: date-time
                  example: '2026-04-15T18:00:00.000Z'
      responses:
        '200':
          description: Poll updated
        '401':
          description: Unauthorized
        '403':
          description: Forbidden or account banned
        '404':
          description: Poll not found
        '500':
          description: Internal server error
    delete:
      summary: Delete a poll (thread owner or admin)
      tags:
        - Polls
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxpoll001
      responses:
        '200':
          description: Poll deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden or account banned
        '404':
          description: Poll not found
        '500':
          description: Internal server error
  /api/polls/{id}/vote:
    post:
      summary: Cast a vote on a poll option
      tags:
        - Polls
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clxpoll001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - optionId
              properties:
                optionId:
                  type: string
                  example: clxopt001
      responses:
        '201':
          description: Vote recorded
        '400':
          description: Poll closed, invalid option, or user already voted
        '401':
          description: Unauthorized
        '403':
          description: Account banned or thread hidden
        '404':
          description: Poll not found
        '500':
          description: Internal server error
  /api/posts/{id}/replies:
    post:
      summary: Create a reply under a post
      tags:
        - Posts
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clx1abc123
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - content
              properties:
                content:
                  type: string
                  example: This is my reply to the post.
      responses:
        '201':
          description: Reply created successfully
        '400':
          description: Content is required
        '401':
          description: Unauthorized
        '403':
          description: Account banned or thread locked/closed
        '404':
          description: Post or thread not found
        '500':
          description: Internal server error
    get:
      summary: Get all visible replies under a post
      tags:
        - Posts
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: clx1abc123
      responses:
        '200':
          description: List of replies
        '404':
          description: Post not found
        '500':
          description: Internal server error
